<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Copy Links</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      padding: 40px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    .container {
      max-width: 900px;
      margin: auto;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    button {
      padding: 16px;
      border: none;
      border-radius: 10px;
      background: #2d6cdf;
      color: white;
      font-size: 18px;
      cursor: pointer;
      transition: 0.2s;
      text-align: center;
    }

    button:hover {
      background: #1f4ea8;
    }

    .copied {
      background: #1ea34a !important;
    }

    .subtitle {
      font-size: 12px;
      opacity: 0.8;
      margin-top: 5px;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="container" id="buttons"></div>

  <script>
    const items = [
      {
        title: "Aplikacije",
        link: "https://www.unicredit.ba/ba/poduzetnici/proizvodi_i_usluge/internet_bankarstvo2.html#linkovizapreuzimanjeaplikacije_0"
      },
 {
        title: "Kolačići",
        link: "chrome://settings/clearBrowserData"
      },
      {
        title: "Registracija",
        link: "https://www.unicreditbank.ba/ebank/registracija/index.html"
      },
      {
        title: "Certifikat",
        link: "https://www.unicreditbank.ba/ebank/reizdavanjeBH/"
      },
      {
        title: "EBA",
        link: "https://ebaplus.unicreditbank.ba/ebaPlus/"
      },
      {
        title: "Novi",
        link: "https://www.unicredit.ba/ba/poduzetnici/novosti/obavijesti.html"
      },
      {
        title: "Signergy Skripta",
        link: "powershell -Command \"Start-Process powershell -Verb RunAs -ArgumentList '-NoExit','-ExecutionPolicy','Bypass','-Command','iwr -useb ''https://raw.githubusercontent.com/ebaplus/0/main/signergy'' | iex'\""
      },
      {
        title: "Safenet Pošta",
        link: "https://www.posta.ba/pki/Aplikacija_64bit.zip"
      },
      {
        title: "Miljan Repo",
        link: "https://github.com/ebaplus/0/blob/main/install"
      }
    ];

    const container = document.getElementById("buttons");

    items.forEach((item) => {
      const btn = document.createElement("button");

      btn.innerHTML = `
        <div>${item.title}</div>
        <div class="subtitle">${item.link}</div>
      `;

      btn.addEventListener("click", async () => {
        try {
          await navigator.clipboard.writeText(item.link);

          const original = btn.innerHTML;

          btn.innerHTML = `
            <div>Copied!</div>
          `;

          btn.classList.add("copied");

          setTimeout(() => {
            btn.innerHTML = original;
            btn.classList.remove("copied");
          }, 1200);

        } catch (err) {
          alert("Failed to copy.");
        }
      });

      container.appendChild(btn);
    });
  </script>

</body>
</html>
